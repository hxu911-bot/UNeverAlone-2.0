name: Keep Alive

on:
  schedule:
    # 每 10 分钟触发一次，范围 UTC 00:00-13:59（北京时间 08:00-21:59）
    - cron: '*/10 0-13 * * *'

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://icebreaker.build/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
          fi
